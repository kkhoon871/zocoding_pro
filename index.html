<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강아지상 고양이상 테스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg-a: #ffe2c6;
      --bg-b: #a7d8ff;
      --panel: #ffffff;
      --panel-soft: #f4f7fb;
      --text: #1f2937;
      --muted: #667085;
      --border: #e5e7eb;
      --primary: #3b5bdb;
      --primary-hover: #3048b5;
      --accent: #ff8a65;
      --shadow: rgba(31, 41, 55, 0.18);
    }

    body.dark {
      color-scheme: dark;
      --bg-a: #101827;
      --bg-b: #29304f;
      --panel: #151c2c;
      --panel-soft: #20293a;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --border: #344058;
      --primary: #7c83ff;
      --primary-hover: #6870e8;
      --accent: #ffb86b;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-a), var(--bg-b));
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 560px;
      background: var(--panel);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 22px 55px var(--shadow);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 11px;
      color: var(--muted);
      background: var(--panel-soft);
      font-size: 13px;
      font-weight: 700;
    }

    .theme-toggle {
      width: auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--text);
      background: var(--panel-soft);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .desc {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.45;
    }

    .upload-card {
      border: 2px dashed var(--border);
      border-radius: 18px;
      padding: 20px;
      background: var(--panel-soft);
      text-align: center;
    }

    .file-input {
      display: none;
    }

    .upload-button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 48px;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      color: #ffffff;
      background: var(--primary);
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .upload-button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .preview-wrap {
      display: none;
      margin-top: 16px;
    }

    .preview-wrap.active {
      display: block;
    }

    .preview {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel);
    }

    .status {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .result {
      display: none;
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: var(--panel-soft);
    }

    .result.active {
      display: block;
    }

    .result-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .result-sub {
      margin: 8px 0 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    .meter-list {
      display: grid;
      gap: 12px;
    }

    .meter-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .meter-track {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--border);
    }

    .meter-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.35s ease;
    }

    .notice {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-align: center;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .app {
        border-radius: 18px;
        padding: 16px;
      }

      .top-bar {
        margin-bottom: 12px;
      }

      .badge,
      .theme-toggle {
        padding: 6px 10px;
        font-size: 12px;
      }

      h1 {
        font-size: 25px;
      }

      .desc {
        margin-bottom: 14px;
        font-size: 14px;
      }

      .upload-card {
        border-radius: 14px;
        padding: 12px;
      }

      .upload-button {
        min-height: 44px;
        border-radius: 12px;
        font-size: 15px;
      }

      .preview {
        max-height: 280px;
      }

      .result {
        margin-top: 12px;
        border-radius: 14px;
        padding: 14px;
      }

      .result-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top-bar">
      <span class="badge">AI 이미지 테스트</span>
      <button class="theme-toggle" id="themeToggle" type="button">다크</button>
    </div>

    <h1>강아지상 고양이상 테스트</h1>
    <p class="desc">사진을 올리면 Teachable Machine 모델이 강아지상과 고양이상 중 더 가까운 쪽을 분석합니다.</p>

    <section class="upload-card">
      <label class="upload-button" for="imageUpload">사진 업로드</label>
      <input class="file-input" id="imageUpload" type="file" accept="image/*" />
      <div class="preview-wrap" id="previewWrap">
        <img class="preview" id="preview" alt="업로드한 사진 미리보기" />
      </div>
      <p class="status" id="status">모델을 준비하는 중입니다.</p>
    </section>

    <section class="result" id="result">
      <h2 class="result-title" id="resultTitle">분석 결과</h2>
      <p class="result-sub" id="resultSub"></p>
      <div class="meter-list" id="meterList"></div>
    </section>

    <p class="notice">이 테스트는 업로드한 사진을 모델로 추정한 재미용 결과입니다.</p>
  </main>

  <script>
    const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/PeBIPK3rc/';
    const labelMap = {
      '강아지': '강아지상',
      '고양이': '고양이상',
      'ê°ìì§': '강아지상',
      'ê³ ìì´': '고양이상'
    };

    let model;
    let isModelReady = false;

    const imageUpload = document.getElementById('imageUpload');
    const preview = document.getElementById('preview');
    const previewWrap = document.getElementById('previewWrap');
    const statusText = document.getElementById('status');
    const result = document.getElementById('result');
    const resultTitle = document.getElementById('resultTitle');
    const resultSub = document.getElementById('resultSub');
    const meterList = document.getElementById('meterList');
    const themeToggle = document.getElementById('themeToggle');

    function normalizeLabel(label) {
      return labelMap[label] || `${label}상`;
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    async function loadModel() {
      try {
        model = await tmImage.load(`${MODEL_URL}model.json`, `${MODEL_URL}metadata.json`);
        isModelReady = true;
        setStatus('사진을 업로드하면 바로 분석합니다.');
      } catch (error) {
        setStatus('모델을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.');
      }
    }

    function renderMeters(predictions) {
      meterList.innerHTML = '';

      predictions.forEach(item => {
        const percent = Math.round(item.probability * 100);
        const row = document.createElement('div');
        const head = document.createElement('div');
        const label = document.createElement('span');
        const value = document.createElement('span');
        const track = document.createElement('div');
        const fill = document.createElement('div');

        head.className = 'meter-head';
        label.textContent = normalizeLabel(item.className);
        value.textContent = `${percent}%`;
        track.className = 'meter-track';
        fill.className = 'meter-fill';
        fill.style.width = `${percent}%`;

        head.appendChild(label);
        head.appendChild(value);
        track.appendChild(fill);
        row.appendChild(head);
        row.appendChild(track);
        meterList.appendChild(row);
      });
    }

    async function analyzeImage() {
      if (!isModelReady) {
        setStatus('모델을 준비하는 중입니다. 잠시 후 다시 시도해주세요.');
        return;
      }

      setStatus('사진을 분석하는 중입니다.');
      const predictions = await model.predict(preview);
      const sorted = predictions.sort((a, b) => b.probability - a.probability);
      const top = sorted[0];
      const topLabel = normalizeLabel(top.className);
      const topPercent = Math.round(top.probability * 100);

      resultTitle.textContent = `${topLabel} ${topPercent}%`;
      resultSub.textContent = topLabel === '강아지상'
        ? '부드럽고 친근한 인상이 더 강하게 잡혔습니다.'
        : '도도하고 또렷한 인상이 더 강하게 잡혔습니다.';

      renderMeters(sorted);
      result.classList.add('active');
      setStatus('분석이 완료되었습니다.');
    }

    imageUpload.addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) return;

      const imageUrl = URL.createObjectURL(file);
      preview.src = imageUrl;
      previewWrap.classList.add('active');
      result.classList.remove('active');
      setStatus('사진을 불러오는 중입니다.');
    });

    preview.addEventListener('load', analyzeImage);

    function applyTheme(theme) {
      const isDark = theme === 'dark';
      document.body.classList.toggle('dark', isDark);
      themeToggle.textContent = isDark ? '화이트' : '다크';
      localStorage.setItem('theme', theme);
    }

    themeToggle.addEventListener('click', () => {
      applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
    });

    applyTheme(localStorage.getItem('theme') || 'light');
    loadModel();
  </script>
</body>
</html>
