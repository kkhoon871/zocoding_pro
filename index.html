<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또번호 추천기</title>
  <style>
    :root {
      color-scheme: light;
      --page-start: #f7d794;
      --page-end: #778beb;
      --panel: #ffffff;
      --panel-soft: #f1f2f6;
      --result-bg: #f8f9fa;
      --border: #ececec;
      --text: #2f3542;
      --muted: #57606f;
      --subtle: #747d8c;
      --input: #ffffff;
      --primary: #3742fa;
      --primary-hover: #2f36d6;
      --success: #2ed573;
      --success-hover: #26b864;
      --shadow: rgba(0, 0, 0, 0.2);
    }

    body.dark {
      color-scheme: dark;
      --page-start: #111827;
      --page-end: #3d2c8d;
      --panel: #181f2f;
      --panel-soft: #232c40;
      --result-bg: #20293a;
      --border: #344058;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --subtle: #94a3b8;
      --input: #111827;
      --primary: #7c83ff;
      --primary-hover: #6a70e8;
      --success: #22c55e;
      --success-hover: #16a34a;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, var(--page-start), var(--page-end));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      transition: background 0.2s ease;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: var(--panel);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 50px var(--shadow);
      text-align: center;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 14px;
    }

    .theme-toggle {
      width: auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      color: var(--text);
      background: var(--panel-soft);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .theme-toggle:hover {
      background: var(--result-bg);
      transform: translateY(-1px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: var(--text);
    }

    .desc {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
    }

    .control-box {
      background: var(--panel-soft);
      border-radius: 14px;
      padding: 14px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    select, input {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px;
      font-size: 16px;
      color: var(--text);
      background: var(--input);
      outline: none;
    }

    select:focus, input:focus {
      border-color: var(--primary);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: var(--primary);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .result {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .set {
      background: var(--result-bg);
      border-radius: 18px;
      padding: 16px;
      border: 1px solid var(--border);
    }

    .set-title {
      text-align: left;
      font-weight: bold;
      color: var(--text);
      margin-bottom: 12px;
    }

    .balls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ball {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.15);
    }

    .yellow { background: #fbc531; }
    .blue { background: #0097e6; }
    .red { background: #e84118; }
    .gray { background: #718093; }
    .green { background: #44bd32; }

    .copy-btn {
      margin-top: 16px;
      background: var(--success);
      font-size: 15px;
      padding: 12px;
      display: none;
    }

    .copy-btn:hover {
      background: var(--success-hover);
    }

    .notice {
      margin-top: 18px;
      font-size: 13px;
      color: var(--subtle);
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 18px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }

      .ball {
        width: 42px;
        height: 42px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="top-bar">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 변경">🌙 다크</button>
    </div>

    <h1>🎱 로또번호 추천기</h1>
    <p class="desc">1부터 45까지 숫자 중 중복 없이 6개를 무작위로 추천합니다.</p>

    <div class="controls">
      <div class="control-box">
        <label for="count">추천 세트 수</label>
        <select id="count">
          <option value="1">1세트</option>
          <option value="3">3세트</option>
          <option value="5" selected>5세트</option>
          <option value="10">10세트</option>
        </select>
      </div>

      <div class="control-box">
        <label for="include">꼭 포함할 번호</label>
        <input id="include" type="text" placeholder="예: 7, 14" />
      </div>
    </div>

    <button type="button" onclick="generateLotto()">번호 추천받기</button>
    <button class="copy-btn" id="copyBtn" type="button" onclick="copyNumbers()">결과 복사하기</button>

    <section class="result" id="result"></section>

    <p class="notice">
      이 추천기는 무작위 번호 생성기입니다. 당첨을 보장하지 않습니다.
    </p>
  </main>

  <script>
    let latestNumbers = [];

    function getBallColor(number) {
      if (number <= 10) return 'yellow';
      if (number <= 20) return 'blue';
      if (number <= 30) return 'red';
      if (number <= 40) return 'gray';
      return 'green';
    }

    function parseIncludeNumbers() {
      const input = document.getElementById('include').value.trim();
      if (!input) return [];

      const numbers = input
        .split(',')
        .map(value => Number(value.trim()))
        .filter(value => Number.isInteger(value));

      const uniqueNumbers = [...new Set(numbers)];

      if (uniqueNumbers.some(number => number < 1 || number > 45)) {
        alert('포함할 번호는 1부터 45 사이여야 합니다.');
        return null;
      }

      if (uniqueNumbers.length > 6) {
        alert('포함할 번호는 최대 6개까지 입력할 수 있습니다.');
        return null;
      }

      return uniqueNumbers;
    }

    function generateOneSet(includeNumbers) {
      const numbers = [...includeNumbers];

      while (numbers.length < 6) {
        const randomNumber = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(randomNumber)) {
          numbers.push(randomNumber);
        }
      }

      return numbers.sort((a, b) => a - b);
    }

    function generateLotto() {
      const count = Number(document.getElementById('count').value);
      const includeNumbers = parseIncludeNumbers();

      if (includeNumbers === null) return;

      latestNumbers = [];
      const resultBox = document.getElementById('result');
      const copyBtn = document.getElementById('copyBtn');

      resultBox.innerHTML = '';

      for (let i = 1; i <= count; i++) {
        const lottoSet = generateOneSet(includeNumbers);
        latestNumbers.push(lottoSet);

        const setBox = document.createElement('div');
        setBox.className = 'set';

        const title = document.createElement('div');
        title.className = 'set-title';
        title.textContent = `${i}세트`;

        const balls = document.createElement('div');
        balls.className = 'balls';

        lottoSet.forEach(number => {
          const ball = document.createElement('div');
          ball.className = `ball ${getBallColor(number)}`;
          ball.textContent = number;
          balls.appendChild(ball);
        });

        setBox.appendChild(title);
        setBox.appendChild(balls);
        resultBox.appendChild(setBox);
      }

      copyBtn.style.display = 'block';
    }

    function copyNumbers() {
      if (latestNumbers.length === 0) return;

      const text = latestNumbers
        .map((set, index) => `${index + 1}세트: ${set.join(', ')}`)
        .join('\n');

      navigator.clipboard.writeText(text)
        .then(() => alert('추천 번호를 복사했습니다.'))
        .catch(() => alert('복사에 실패했습니다. 직접 선택해서 복사해주세요.'));
    }

    function applyTheme(theme) {
      const isDark = theme === 'dark';
      const toggle = document.getElementById('themeToggle');

      document.body.classList.toggle('dark', isDark);
      toggle.textContent = isDark ? '☀️ 화이트' : '🌙 다크';
      toggle.setAttribute('aria-label', isDark ? '화이트 모드로 변경' : '다크 모드로 변경');
      localStorage.setItem('theme', theme);
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      const nextTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
      applyTheme(nextTheme);
    });

    applyTheme(localStorage.getItem('theme') || 'light');
    generateLotto();
  </script>
</body>
</html>
