<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또번호 추천기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7d794, #778beb);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: #2f3542;
    }

    .desc {
      margin: 0 0 24px;
      color: #57606f;
      line-height: 1.5;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
    }

    .control-box {
      background: #f1f2f6;
      border-radius: 14px;
      padding: 14px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 14px;
      color: #57606f;
      margin-bottom: 8px;
    }

    select, input {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 16px;
      background: white;
      outline: none;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: #3742fa;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      background: #2f36d6;
      transform: translateY(-2px);
    }

    .result {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .set {
      background: #f8f9fa;
      border-radius: 18px;
      padding: 16px;
      border: 1px solid #ececec;
    }

    .set-title {
      text-align: left;
      font-weight: bold;
      color: #2f3542;
      margin-bottom: 12px;
    }

    .balls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ball {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.15);
    }

    .yellow { background: #fbc531; }
    .blue { background: #0097e6; }
    .red { background: #e84118; }
    .gray { background: #718093; }
    .green { background: #44bd32; }

    .copy-btn {
      margin-top: 16px;
      background: #2ed573;
      font-size: 15px;
      padding: 12px;
      display: none;
    }

    .copy-btn:hover {
      background: #26b864;
    }

    .notice {
      margin-top: 18px;
      font-size: 13px;
      color: #747d8c;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 18px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }

      .ball {
        width: 42px;
        height: 42px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>🍀 로또번호 추천기</h1>
    <p class="desc">1부터 45까지 숫자 중 중복 없이 6개를 랜덤 추천합니다.</p>

    <div class="controls">
      <div class="control-box">
        <label for="count">추천 세트 수</label>
        <select id="count">
          <option value="1">1세트</option>
          <option value="3">3세트</option>
          <option value="5" selected>5세트</option>
          <option value="10">10세트</option>
        </select>
      </div>

      <div class="control-box">
        <label for="include">꼭 포함할 번호</label>
        <input id="include" type="text" placeholder="예: 7, 14" />
      </div>
    </div>

    <button onclick="generateLotto()">번호 추천받기</button>
    <button class="copy-btn" id="copyBtn" onclick="copyNumbers()">결과 복사하기</button>

    <section class="result" id="result"></section>

    <p class="notice">
      이 추천기는 재미용 랜덤 번호 생성기입니다. 당첨을 보장하지 않습니다.
    </p>
  </main>

  <script>
    let latestNumbers = [];

    function getBallColor(number) {
      if (number <= 10) return 'yellow';
      if (number <= 20) return 'blue';
      if (number <= 30) return 'red';
      if (number <= 40) return 'gray';
      return 'green';
    }

    function parseIncludeNumbers() {
      const input = document.getElementById('include').value.trim();
      if (!input) return [];

      const numbers = input
        .split(',')
        .map(value => Number(value.trim()))
        .filter(value => Number.isInteger(value));

      const uniqueNumbers = [...new Set(numbers)];

      if (uniqueNumbers.some(number => number < 1 || number > 45)) {
        alert('포함할 번호는 1부터 45 사이여야 합니다.');
        return null;
      }

      if (uniqueNumbers.length > 6) {
        alert('포함할 번호는 최대 6개까지 입력할 수 있습니다.');
        return null;
      }

      return uniqueNumbers;
    }

    function generateOneSet(includeNumbers) {
      const numbers = [...includeNumbers];

      while (numbers.length < 6) {
        const randomNumber = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(randomNumber)) {
          numbers.push(randomNumber);
        }
      }

      return numbers.sort((a, b) => a - b);
    }

    function generateLotto() {
      const count = Number(document.getElementById('count').value);
      const includeNumbers = parseIncludeNumbers();

      if (includeNumbers === null) return;

      latestNumbers = [];
      const resultBox = document.getElementById('result');
      const copyBtn = document.getElementById('copyBtn');

      resultBox.innerHTML = '';

      for (let i = 1; i <= count; i++) {
        const lottoSet = generateOneSet(includeNumbers);
        latestNumbers.push(lottoSet);

        const setBox = document.createElement('div');
        setBox.className = 'set';

        const title = document.createElement('div');
        title.className = 'set-title';
        title.textContent = `${i}세트`;

        const balls = document.createElement('div');
        balls.className = 'balls';

        lottoSet.forEach(number => {
          const ball = document.createElement('div');
          ball.className = `ball ${getBallColor(number)}`;
          ball.textContent = number;
          balls.appendChild(ball);
        });

        setBox.appendChild(title);
        setBox.appendChild(balls);
        resultBox.appendChild(setBox);
      }

      copyBtn.style.display = 'block';
    }

    function copyNumbers() {
      if (latestNumbers.length === 0) return;

      const text = latestNumbers
        .map((set, index) => `${index + 1}세트: ${set.join(', ')}`)
        .join('\n');

      navigator.clipboard.writeText(text)
        .then(() => alert('추천 번호를 복사했습니다.'))
        .catch(() => alert('복사에 실패했습니다. 직접 선택해서 복사해주세요.'));
    }

    generateLotto();
  </script>
</body>
</html>
